<h2>完整视觉设计预览</h2>
<p class="subtitle">留白意境 × 雪绢冷调 · 完整界面效果</p>

<div class="mockup">

  <div class="mockup-body">

      <line x1="0" y1="110" x2="600" y2="110" stroke="#f0ede8" stroke-width="0.5" opacity="0.2"/>
      <line x1="0" y1="140" x2="600" y2="140" stroke="#f0ede8" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="170" x2="600" y2="170" stroke="#f0ede8" stroke-width="0.5" opacity="0.2"/>
      <line x1="0" y1="200" x2="600" y2="200" stroke="#f0ede8" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="230" x2="600" y2="230" stroke="#f0ede8" stroke-width="0.5" opacity="0.2"/>
      <line x1="0" y1="260" x2="600" y2="260" stroke="#f0ede8" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="290" x2="600" y2="290" stroke="#f0ede8" stroke-width="0.5" opacity="0.2"/>
      <line x1="0" y1="320" x2="600" y2="320" stroke="#f0ede8" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="350" x2="600" y2="350" stroke="#f0ede8" stroke-width="0.5" opacity="0.2"/>

      <!-- Ink wash decoration: top right corner -->
      <ellipse cx="520" cy="40" rx="80" ry="30" fill="none" stroke="#d0c8bc" stroke-width="1" opacity="0.3"/>
      <ellipse cx="500" cy="50" rx="50" ry="20" fill="none" stroke="#d0c8bc" stroke-width="1.5" opacity="0.2"/>

      <!-- Navigation bar: floating pill -->
      <rect x="140" y="10" width="320" height="36" rx="18" fill="white" stroke="#e8e0d4" stroke-width="1"/>
      <!-- Brand: horse seal -->
      <rect x="155" y="18" width="16" height="16" fill="#c23a2a" opacity="0.5" rx="2"/>
      <text x="180" y="31" fill="#3a3530" font-size="13" font-weight="bold" font-family="serif">SuperHermes</text>
      <!-- Nav items -->
      <rect x="260" y="16" width="60" height="24" rx="12" fill="#f5ede8"/>
      <text x="272" y="32" fill="#c23a2a" font-size="11">+ 新对话</text>
      <text x="335" y="32" fill="#888" font-size="11">历史</text>
      <!-- User avatar -->
      <circle cx="445" cy="28" r="12" fill="#f0ede8" stroke="#e0d8cc" stroke-width="1"/>
      <text x="445" y="32" text-anchor="middle" fill="#c23a2a" font-size="9" font-weight="bold">U</text>

      <rect x="380" y="185" width="130" height="32" rx="8" fill="white" stroke="#e8e0d4" stroke-width="1"/>
      <text x="400" y="205" fill="#666" font-size="10">分析 RAG 检索为什么不准</text>

      <!-- Bot message -->
      <text x="60" y="250" fill="#5a554e" font-size="11" font-family="sans-serif">你好！我是 SuperHermes 小马 🐴...</text>
      <line x1="60" y1="260" x2="280" y2="260" stroke="#e0d8cc" stroke-width="0.5" opacity="0.5"/>
      <text x="60" y="275" fill="#5a554e" font-size="11" font-family="sans-serif">有什么可以帮你的吗？</text>

      <!-- User message bubble -->
      <rect x="380" y="295" width="160" height="30" rx="12" fill="url(#userBubble)"/>
      <text x="460" y="314" text-anchor="middle" fill="white" font-size="11">帮我查一下今天的天气</text>

      <!-- Composer dock -->
      <rect x="100" y="350" width="400" height="38" rx="12" fill="white" stroke="#e0d8cc" stroke-width="1"/>
      <text x="120" y="374" fill="#ccc" font-size="12">输入你的问题...</text>
      <circle cx="480" cy="369" r="12" fill="#c23a2a"/>
      <path d="M476 365 L484 369 L476 373 Z" fill="white"/>
    </svg>
  </div>
</div>

<div class="section" style="margin-top:16px;">
  <h3>设计要点总结</h3>
  <ul>
    <li><strong>背景：</strong>雪绢白 #faf8f5，带极淡纸纤维纹理</li>
    <li><strong>文字：</strong>焦墨色 #3a3530（深但柔和，非纯黑）</li>
    <li><strong>用户气泡：</strong>朱砂渐变 #c23a2a → #a03020</li>
    <li><strong>Bot 消息：</strong>无边框，直接焦墨文字，左侧淡淡朱砂竖线</li>
    <li><strong>导航栏：</strong>纯白悬浮胶囊，半透明边框</li>
    <li><strong>输入框：</strong>纯白底，朱砂聚焦光晕</li>
    <li><strong>装饰：</strong>角落淡淡的水墨晕染，如山水画的远山</li>
    <li><strong>字体：</strong>标题用宋体/衬线，正文用圆润无衬线（开心感）</li>
  </ul>
</div>

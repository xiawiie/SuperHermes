<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>SuperHermes Design Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 雪绢冷调 */
      --bg-primary: #faf8f5;
      --bg-nav: rgba(255, 255, 255, 0.85);
      --bg-card: rgba(255, 255, 255, 0.7);
      --bg-input: rgba(255, 255, 255, 0.9);

      /* 焦墨色 */
      --text-primary: #3a3530;
      --text-secondary: #6a6258;
      --text-muted: #9e9688;

      /* 朱砂 */
      --cinnabar: #c23a2a;
      --cinnabar-deep: #a03020;
      --cinnabar-soft: rgba(194, 58, 42, 0.08);
      --cinnabar-glow: rgba(194, 58, 42, 0.15);

      /* 边框 */
      --border-light: rgba(232, 224, 212, 0.6);
      --border-medium: rgba(232, 224, 212, 0.9);

      /* 阴影 */
      --shadow-float: 0 8px 32px rgba(0, 0, 0, 0.08);
      --shadow-nav: 0 4px 16px rgba(0, 0, 0, 0.06);

      /* 布局 */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --nav-height: 52px;
      --content-max: 720px;
    }

    body {
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
    }

    /* 纸纤维纹理 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(240, 237, 232, 0.4) 0 1px,
          transparent 1px 6px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(240, 237, 232, 0.3) 0 1px,
          transparent 1px 10px
        );
    }

    /* 水墨晕染装饰 */
    body::after {
      content: "";
      position: fixed;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(208, 200, 188, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 导航栏 */
    .top-nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(980px, calc(100vw - 32px));
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px;
      background: var(--bg-nav);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-nav);
      z-index: 40;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .brand-seal {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: var(--cinnabar-soft);
      color: var(--cinnabar);
      font-size: 14px;
      font-weight: bold;
    }

    .brand-name {
      font-family: "Noto Serif SC", serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }

    .nav-actions {
      display: flex;
      gap: 4px;
      padding: 3px;
      background: rgba(0,0,0,0.02);
      border-radius: var(--radius-md);
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-pill:hover {
      background: var(--cinnabar-soft);
      color: var(--text-primary);
    }

    .nav-pill.active {
      background: var(--cinnabar-glow);
      color: var(--cinnabar);
    }

    .user-cluster {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--cinnabar-soft);
      color: var(--cinnabar);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
    }

    /* 主工作区 */
    .workspace {
      padding-top: 90px;
      padding-bottom: 120px;
      min-height: 100vh;
    }

    .chat-scroll {
      width: min(var(--content-max), calc(100vw - 40px));
      margin: 0 auto;
    }

    /* 欢迎页 */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      gap: 12px;
    }

    .welcome-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 8px;
    }

    .welcome-logo svg {
      width: 100%;
      height: 100%;
    }

    .welcome-screen h1 {
      font-family: "Noto Serif SC", serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .welcome-screen p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
      max-width: 520px;
    }

    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: min(680px, 100%);
      margin-top: 20px;
    }

    .prompt-grid button {
      min-height: 54px;
      padding: 12px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .prompt-grid button:hover {
      border-color: var(--cinnabar);
      transform: translateY(-1px);
      box-shadow: var(--shadow-float);
    }

    /* 消息 */
    .message {
      margin: 20px 0;
    }

    .bot-message {
      align-items: flex-start;
    }

    .user-message {
      align-items: flex-end;
    }

    .message-content {
      max-width: 70%;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .bot-content {
      padding: 2px 0 2px 14px;
      border-left: 2px solid var(--cinnabar-glow);
      color: var(--text-secondary);
    }

    .user-content {
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--cinnabar), var(--cinnabar-deep));
      color: white;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(194, 58, 42, 0.2);
    }

    /* 输入框 */
    .composer-dock {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(var(--content-max), calc(100vw - 40px));
      z-index: 35;
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-float);
      backdrop-filter: blur(20px);
    }

    .composer textarea {
      flex: 1;
      min-height: 40px;
      max-height: 120px;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
    }

    .composer textarea::placeholder {
      color: var(--text-muted);
    }

    .send-button {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--cinnabar);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .send-button:hover {
      background: var(--cinnabar-deep);
      transform: translateY(-1px);
    }

    .composer-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .composer-note {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <header class="top-nav">
    <button class="brand-lockup">
      <span class="brand-seal">🐴</span>
      <span class="brand-name">SuperHermes</span>
    </button>

    <div class="nav-actions">
      <button class="nav-pill active"><i class="fas fa-plus"></i> 新对话</button>
      <button class="nav-pill"><i class="fas fa-clock"></i> 历史</button>
      <button class="nav-pill"><i class="fas fa-database"></i> 知识库</button>
    </div>

    <div class="user-cluster">
      <span class="user-avatar">U</span>
    </div>
  </header>

  <main class="workspace">
    <div class="chat-scroll">
      <div class="welcome-screen">
        <div class="welcome-logo">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="15" width="40" height="50" fill="none" stroke="#9e9688" stroke-width="3" rx="4"/>
            <rect x="25" y="20" width="30" height="40" fill="none" stroke="#c23a2a" stroke-width="2" opacity="0.6" rx="2"/>
            <text x="40" y="45" text-anchor="middle" fill="#c23a2a" font-size="20" font-family="serif" font-weight="bold">马</text>
          </svg>
        </div>

        <h1>有什么想问 SuperHermes？</h1>
        <p>可以检索知识库、分析文档、解释代码，或继续一段已有对话。</p>

        <div class="prompt-grid">
          <button>解释知识库核心结论</button>
          <button>帮我整理一份技术方案</button>
          <button>分析 RAG 检索为什么不准</button>
        </div>
      </div>

      <!-- Example messages -->
      <div class="message bot-message">
        <div class="message-content bot-content">
          你好！我是 SuperHermes 小马，有什么可以帮你的吗？
        </div>
      </div>

      <div class="message user-message">
        <div class="message-content user-content">
          帮我查一下今天的天气
        </div>
      </div>
    </div>
  </main>

  <div class="composer-dock">
    <div class="composer">
      <button class="composer-icon"><i class="fas fa-paperclip"></i></button>
      <textarea placeholder="输入你的问题..."></textarea>
      <button class="send-button"><i class="fas fa-arrow-up"></i></button>
    </div>
    <p class="composer-note">AI 生成的内容可能包含错误，请仔细甄别。</p>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
